<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Debug Mix2</title>
<style>
body{
    background:#111;
    color:#eee;
    font-family:Arial;
    padding:20px;
}
pre{
    background:#222;
    padding:15px;
    border-radius:8px;
    overflow:auto;
}
button{
    padding:10px 20px;
    font-size:16px;
}
.ok{color:#00ff88;}
.err{color:#ff5555;}
</style>
</head>
<body>

<h1>DEBUG GOOGLE SHEETS</h1>

<p><b>Foglio:</b> <span id="sheet"></span></p>

<button onclick="load()">Leggi Mix2</button>

<h2>Risultato</h2>

<pre id="out">...</pre>

<script src="config.js"></script>

<script>

document.getElementById("sheet").textContent=CONFIG.matchSheet;

async function load(){

const out=document.getElementById("out");

const url=
`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.spreadsheetId}/values/${encodeURIComponent(CONFIG.matchSheet)}?key=${CONFIG.apiKey}`;

out.textContent="Richiesta...\n\n"+url;

try{

const res=await fetch(url);

const text=await res.text();

out.textContent=
"STATUS: "+res.status+"\n\n"+
text;

}catch(e){

out.textContent=e;

}

}

</script>

</body>
</html>
